version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      tanstack:
        patterns:
          - "@tanstack/*"
      types:
        patterns:
          - "@types/*"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
