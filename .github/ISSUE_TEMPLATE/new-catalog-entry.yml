name: 📚 새 카탈로그 항목 제안
description: 카탈로그에 새 브랜드/서비스 추가를 제안합니다
labels: ["catalog/new-entry"]
body:
  - type: markdown
    attributes:
      value: |
        새 항목 제안 감사합니다. 본 이슈는 추가 여부 토의용이며, 실제 항목 작성은 [/design-md 스킬](https://github.com/CaesiumY/ko-design-md/blob/main/CONTRIBUTING.md#1-새-항목-추가-권장-design-md-스킬-사용) 사용을 권장합니다.

  - type: input
    id: brand-name
    attributes:
      label: 브랜드/서비스명
      placeholder: 예) 토스, 카카오뱅크, 당근
    validations:
      required: true

  - type: input
    id: official-site
    attributes:
      label: 공식 사이트 URL
      placeholder: https://example.com
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: 카테고리 후보
      description: 정확하지 않다면 기타로 두고 토의해도 됩니다
      options:
        - 결제
        - 메신저
        - 커머스
        - 배달
        - 모빌리티
        - 콘텐츠
        - 커뮤니티
        - 여행
        - 공공
        - 개발자도구
        - 교육
        - 커리어
        - 기타
    validations:
      required: true

  - type: textarea
    id: design-resources
    attributes:
      label: 디자인 시스템 자료 URL
      description: 가능한 모든 공식 자료를 링크해주세요 (디자인 가이드, 스타일 가이드 페이지, Figma Community, 블로그 포스트 등)
      placeholder: |
        - https://...
        - https://...
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: 추가 이유
      description: 이 카탈로그에 추가되어야 한다고 생각하는 이유를 적어주세요
    validations:
      required: false

  - type: checkboxes
    id: license-check
    attributes:
      label: 라이선스/상표 우려 검토
      options:
        - label: 브랜드 자산(로고)을 식별·참조 목적으로 사용하는 것에 대한 우려를 검토했습니다 ([NOTICE](https://github.com/CaesiumY/ko-design-md/blob/main/NOTICE) 참조)
          required: true
        - label: 디자인 시스템 자료가 공개되어 있어 인용 가능합니다
          required: true
