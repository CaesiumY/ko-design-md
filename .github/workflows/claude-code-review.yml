name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

# 같은 PR에 새 커밋이 푸시되면 진행 중이던 이전 리뷰는 취소 (중복 비용 방지)
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # 메인테이너 브랜치의 내부 PR만 리뷰.
    # 포크·dependabot PR은 시크릿이 격리 컨텍스트로 전달되지 않아(GITHUB_TOKEN read-only 강등) 인증 실패하므로 스킵(조건 false → 잡 미생성). 드래프트도 스킵.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # gh pr comment로 리뷰 코멘트 게시 (App 토큰 미가용 시 GITHUB_TOKEN 폴백 대비)
      issues: write # PR 대화 코멘트는 issue 코멘트 API를 사용
      id-token: write # claude-code-action이 GitHub App 토큰 교환에 OIDC 사용 (필수)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      # 게시 검증(아래 Verify 스텝)의 기준 시각. 이 시각 이후 생성된
      # 마커 코멘트가 없으면 리뷰가 무음 실패한 것 (#157).
      - name: Capture start time
        id: start
        run: echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # 블로그(CaesiumY.github.io)에서 검증된 자연어 단일 에이전트 리뷰 방식.
          # 플러그인(멀티에이전트)은 헤드리스에서 서브에이전트 도구가 막혀 코멘트까지 도달 못 함
          # → 자연어 프롬프트 + gh 도구로 교체. 단일 에이전트라 Task 상속 문제 없음.
          prompt: |
            이 풀 리퀘스트를 코드 리뷰하고 아래 관점으로 한국어 피드백을 주세요:
            - 코드 품질과 베스트 프랙티스
            - 잠재적 버그·이슈
            - 성능 고려사항
            - 보안 우려
            - 레포 CLAUDE.md의 카탈로그/design.md 정책 준수 (해당 시)

            레포의 CLAUDE.md를 스타일·컨벤션 가이드로 참고하고, 건설적이고 구체적으로 작성하세요.
            리뷰는 `gh pr comment` (Bash 도구)로 PR에 코멘트로 남기세요. 모든 출력은 한국어로.
            지적할 것이 없어도 반드시 "이상 없음" 요약이라도 코멘트로 게시하세요 —
            최종 텍스트로만 출력하고 게시를 생략하면 안 됩니다.
            코멘트 본문은 반드시 `## Claude Code Review` 헤딩으로 시작하세요 —
            후속 검증 스텝이 이 마커로 게시 여부를 확인합니다.
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'

      # 리뷰 에이전트가 "성공"으로 끝나고도 코멘트를 안 남기는 무음 실패(#157)를
      # 잡는다: 잡 시작 이후 생성된, 마커 헤딩으로 시작하는 코멘트가 1개 이상인지
      # 확인. 개수 전후 비교 대신 시각+마커 필터를 쓰는 이유 — 동시 코멘트 레이스와
      # 액션 진행 코멘트로 인한 위양성 회피.
      - name: Verify review comment was posted
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXECUTION_FILE: ${{ steps.claude-review.outputs.execution_file }}
        run: |
          # 액션이 Claude를 실행조차 안 한 경우(대표: 이 워크플로우 파일을 수정하는
          # PR에서 액션의 워크플로우 검증이 스스로 스킵 — 머지 후 정상 동작)는
          # 무음 미게시가 아니므로 경고만 남기고 통과. execution_file은 실행 시에만
          # 설정되는 공식 output이라 실행 여부의 결정론적 신호다.
          if [ -z "$EXECUTION_FILE" ]; then
            echo "::warning::claude-code-action did not execute (workflow-validation skip on a PR editing this workflow, or output rename) — skipping comment verification."
            exit 0
          fi
          n=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments?per_page=100" \
                --jq "[.[] | select(.created_at >= \"${{ steps.start.outputs.ts }}\")
                           | select(.body | startswith(\"## Claude Code Review\"))] | length")
          echo "review comments posted since job start: $n"
          if [ "${n:-0}" -eq 0 ]; then
            echo "::error::Claude review ran but did not post its review comment (silent failure — re-trigger with @claude or re-run this job)."
            exit 1
          fi
