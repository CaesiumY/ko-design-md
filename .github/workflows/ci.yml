name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      # validate:catalog is a strict superset of the citation-only
      # validate:sources gate (frontmatter round-trip, section order,
      # OKLCH-only token values, citations). validate:sources stays available
      # as a focused local command.
      - name: Validate catalog entries
        run: pnpm validate:catalog

      - name: Validate previews
        run: pnpm validate:previews

      - name: Build
        run: pnpm build
