name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      # validate:catalog is a strict superset of the citation-only
      # validate:sources gate (frontmatter round-trip, section order,
      # OKLCH-only token values, citations). validate:sources stays available
      # as a focused local command.
      - name: Validate catalog entries
        run: pnpm validate:catalog

      - name: Validate previews
        run: pnpm validate:previews

      # A sidecar is generated FROM its md, so the two drifting apart means the
      # site serves stale tokens. That is not hypothetical: wanted lost 51 colors
      # when an md edit skipped regeneration, and nothing caught it until a
      # bulk rebuild happened to surface the diff.
      - name: Check token sidecars are in sync
        run: pnpm tokens:check

      # Past-data counterpart to the oklch-hex-mismatch rule: validate:catalog
      # only judges `name: oklch(…)  # #hex` lines, while this also sweeps the
      # derived literals (aliases, gradients, alpha, preview CSS) those values
      # get copied into.
      - name: Audit OKLCH ↔ hex agreement
        run: pnpm audit:oklch

      - name: Build
        run: pnpm build
